<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fill Rate · Conexões da História</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Raleway', sans-serif;
      background: #f8f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: #fff;
      border-bottom: 1px solid #e4ddd4;
      padding: 0 2rem;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 1.75rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-logo {
      font-weight: 700;
      font-size: 0.88rem;
      color: #1a1a1a;
      text-decoration: none;
      margin-right: auto;
      letter-spacing: 0.2px;
    }
    .nav-link {
      font-size: 0.78rem;
      color: #999;
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-link:hover { color: #b87010; }
    .nav-link.active { color: #b87010; font-weight: 600; }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 3.5rem 2rem 6rem;
    }

    .page-header {
      margin-bottom: 2.5rem;
    }
    .page-tag {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #b87010;
      margin-bottom: 0.6rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }
    h1 span { color: #b87010; }
    .page-sub {
      font-size: 0.88rem;
      color: #888;
      font-weight: 300;
    }

    /* ── Summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    @media (max-width: 640px) { .summary-grid { grid-template-columns: 1fr 1fr; } }

    .summary-card {
      background: #fff;
      border: 1px solid #e4ddd4;
      border-radius: 10px;
      padding: 1.25rem;
    }
    .s-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #bbb;
      margin-bottom: 0.4rem;
    }
    .s-value {
      font-size: 1.65rem;
      font-weight: 700;
      color: #b87010;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .s-desc {
      font-size: 0.7rem;
      color: #aaa;
    }

    /* ── Chart ── */
    .chart-card {
      background: #fff;
      border: 1px solid #e4ddd4;
      border-radius: 12px;
      padding: 2rem;
    }

    .chart-section-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #ccc;
      margin-bottom: 1.25rem;
    }

    .chart-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }
    .chart-row:last-child { margin-bottom: 0; }

    .field-label {
      font-size: 0.76rem;
      color: #666;
      width: 130px;
      flex-shrink: 0;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-wrap {
      flex: 1;
      height: 20px;
      position: relative;
      border-radius: 5px;
      overflow: hidden;
      background: #f0ebe3;
    }

    /* bullet chart background zones */
    .zone { position: absolute; top: 0; bottom: 0; }
    .zone-poor { left: 0;   width: 50%; background: rgba(210,60,60,0.08); }
    .zone-mid  { left: 50%; width: 30%; background: rgba(210,160,30,0.08); }
    .zone-good { left: 80%; width: 20%; background: rgba(60,160,60,0.08); }

    .bar-filled {
      position: absolute;
      left: 0; top: 3px; bottom: 3px;
      background: #c07820;
      border-radius: 3px;
      z-index: 1;
    }

    /* target line at 80% */
    .bar-target {
      position: absolute;
      top: 2px; bottom: 2px;
      left: 80%;
      width: 2px;
      background: rgba(100,100,100,0.35);
      z-index: 2;
    }

    .bar-stats {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 190px;
      flex-shrink: 0;
      font-size: 0.72rem;
    }
    .stat-filled { color: #c07820; font-weight: 600; min-width: 30px; text-align: right; }
    .stat-sep    { color: #ddd; }
    .stat-empty  { color: #bbb; flex: 1; }
    .stat-pct    { font-weight: 700; font-size: 0.78rem; color: #555; width: 38px; text-align: right; }

    .chart-divider {
      height: 1px;
      background: #f0ebe3;
      margin: 1.25rem 0;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid #f0ebe3;
      font-size: 0.7rem;
      color: #aaa;
    }
    .legend-item { display: flex; align-items: center; gap: 0.45rem; }
    .l-swatch { width: 20px; height: 6px; border-radius: 3px; }
    .l-line   { width: 2px; height: 14px; border-radius: 1px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #ccc;
      padding: 2rem;
      border-top: 1px solid #e8e0d4;
      margin-top: 3rem;
    }
    footer a { color: #bbb; text-decoration: none; }
    footer a:hover { color: #b87010; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Conexões da História</a>
  <a class="nav-link" href="diagram.html">Diagrama</a>
  <a class="nav-link" href="matrix.html">Matrix</a>
  <a class="nav-link active" href="stats.html">Fill Rate</a>
  <a class="nav-link" href="https://www.google.com.br/maps/d/u/0/viewer?mid=1eOwVJYlWOV6PLI06K-h-ofmkJXyrgrnj&ll=-8.06055276702706%2C-34.882075024350215&z=15" target="_blank">Mapa ↗</a>
</nav>

<main>
  <div class="page-header">
    <div class="page-tag">Qualidade dos dados</div>
    <h1>Fill Rate do <span>Schema</span></h1>
    <p class="page-sub" id="page-sub">Carregando…</p>
  </div>

  <div class="summary-grid" id="summary-grid"></div>

  <div class="chart-card">
    <div id="chart-core"></div>
    <div class="chart-divider"></div>
    <div id="chart-conn"></div>

    <div class="legend">
      <div class="legend-item">
        <div class="l-swatch" style="background:#c07820"></div>
        Preenchido
      </div>
      <div class="legend-item">
        <div class="l-swatch" style="background:#e0d8ce"></div>
        Vazio
      </div>
      <div class="legend-item">
        <div class="l-line" style="background:rgba(100,100,100,0.35)"></div>
        Meta 80%
      </div>
      <div class="legend-item">
        <div class="l-swatch" style="background:rgba(210,60,60,0.15); width:14px"></div>
        &lt; 50%
      </div>
      <div class="legend-item">
        <div class="l-swatch" style="background:rgba(210,160,30,0.15); width:14px"></div>
        50–80%
      </div>
      <div class="legend-item">
        <div class="l-swatch" style="background:rgba(60,160,60,0.15); width:14px"></div>
        &gt; 80%
      </div>
    </div>
  </div>
</main>

<footer>
  <a href="index.html">← Voltar</a>
  &nbsp;·&nbsp;
  <a href="https://conexoesdahistoria.com/" target="_blank">conexoesdahistoria.com</a>
</footer>

<script>
function parseCSVLine(line) {
  var result = [], cur = '', inQ = false;
  for (var i = 0; i < line.length; i++) {
    var ch = line[i];
    if (ch === '"') {
      if (inQ && line[i + 1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(cur); cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result;
}

fetch('lista-geral-do-mapeamento.csv')
  .then(function(r) { return r.text(); })
  .then(function(text) {
    var lines = text.replace(/\r/g, '').split('\n').filter(function(l) { return l.trim(); });
    var headers = parseCSVLine(lines[0]);
    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var vals = parseCSVLine(lines[i]);
      var row = {};
      headers.forEach(function(h, j) { row[h] = (vals[j] || '').trim(); });
      rows.push(row);
    }
    var N = rows.length;

    document.getElementById('page-sub').textContent =
      N + ' nós · ' + headers.length + ' campos';

    // Compute fill rates per field
    var rates = headers.map(function(h) {
      var filled = rows.filter(function(r) { return r[h] && r[h].length; }).length;
      return { field: h, filled: filled, empty: N - filled, pct: Math.round(filled * 100 / N) };
    });

    // Summary stats
    var coreFields = ['Nome','Tipo','Sub-Tipo','Local','Imagem','Descrição'];
    var coreRates  = rates.filter(function(r) { return coreFields.indexOf(r.field) >= 0; });
    var connRates  = rates.filter(function(r) { return r.field.indexOf('Intercon') === 0; });

    var avgCore = Math.round(coreRates.reduce(function(s, r) { return s + r.pct; }, 0) / coreRates.length);
    var withImg  = rates.find(function(r) { return r.field === 'Imagem'; });
    var withConn = rates.find(function(r) { return r.field === 'Interconexão 1'; });
    var isolated = withConn ? withConn.empty : 0;

    document.getElementById('summary-grid').innerHTML =
      card('Total de Nós',    N,         'registros no CSV') +
      card('Core Fill Rate',  avgCore + '%', 'Nome, Tipo, Local, Imagem…') +
      card('Com Imagem',      withImg ? withImg.filled : '—', 'possuem URL de imagem') +
      card('Sem Conexões',    isolated,  'nós isolados (0 interconexões)');

    // Render chart sections
    document.getElementById('chart-core').innerHTML =
      sectionLabel('Campos principais') +
      coreFields.map(function(f) {
        var r = rates.find(function(x) { return x.field === f; });
        return r ? rowHTML(r, N) : '';
      }).join('');

    document.getElementById('chart-conn').innerHTML =
      sectionLabel('Interconexões') +
      connRates.map(function(r) { return rowHTML(r, N); }).join('');
  });

function card(label, value, desc) {
  return '<div class="summary-card">' +
    '<div class="s-label">' + label + '</div>' +
    '<div class="s-value">' + value + '</div>' +
    '<div class="s-desc">' + desc + '</div>' +
    '</div>';
}

function sectionLabel(text) {
  return '<div class="chart-section-label">' + text + '</div>';
}

function rowHTML(r, N) {
  var name = r.field.replace('Interconexão ', 'Intercon. ');
  return '<div class="chart-row">' +
    '<div class="field-label" title="' + r.field + '">' + name + '</div>' +
    '<div class="bar-wrap">' +
      '<div class="zone zone-poor"></div>' +
      '<div class="zone zone-mid"></div>' +
      '<div class="zone zone-good"></div>' +
      '<div class="bar-filled" style="width:' + r.pct + '%"></div>' +
      '<div class="bar-target"></div>' +
    '</div>' +
    '<div class="bar-stats">' +
      '<span class="stat-filled">' + r.filled + '</span>' +
      '<span class="stat-sep">+</span>' +
      '<span class="stat-empty">' + r.empty + ' vazios</span>' +
      '<span class="stat-pct">' + r.pct + '%</span>' +
    '</div>' +
    '</div>';
}
</script>

</body>
</html>
